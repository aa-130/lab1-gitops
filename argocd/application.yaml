# example-app.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: lab1-gitops
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/aa-130/lab1-gitops.git
    targetRevision: HEAD
    path: manifests/production # Path to deployment manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
